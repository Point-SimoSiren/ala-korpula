<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halkopeli | Ala-Korpula</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1e3724 0%, #0d1a12 55%, #050a08 100%);
        color: #f3f7f2;
        overflow: hidden;
      }

      #hud {
        position: fixed;
        inset: 3.6rem auto auto 50%;
        transform: translateX(-50%);
        width: min(40rem, calc(100vw - 2rem));
        background: rgba(12, 24, 16, 0.65);
        border: 1px solid rgba(209, 230, 208, 0.2);
        border-radius: 14px;
        padding: 0.9rem 1.6rem;
        text-align: center;
        letter-spacing: 0.03em;
        backdrop-filter: blur(6px);
        box-shadow: 0 18px 40px rgba(6, 12, 8, 0.55);
        z-index: 10;
      }

      #hud h1 {
        margin: 0 0 0.3rem;
        font-size: clamp(1.6rem, 3vw, 2rem);
        letter-spacing: 0.08em;
      }

      #hud p {
        margin: 0.2rem 0 0.6rem;
        font-size: 0.95rem;
        opacity: 0.85;
      }

      #status {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #d1e6d0;
      }

      .hud-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .hud-stat {
        background: rgba(8, 18, 11, 0.55);
        border: 1px solid rgba(209, 230, 208, 0.14);
        border-radius: 10px;
        padding: 0.45rem 0.35rem;
      }

      .hud-stat-label {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.72;
      }

      .hud-stat-value {
        display: block;
        margin-top: 0.16rem;
        font-size: 1rem;
        font-weight: 700;
      }

      .hud-controls {
        margin-top: 0.65rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.65rem;
        flex-wrap: wrap;
      }

      #difficulty {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.9;
      }

      .restart-button {
        border: 1px solid rgba(209, 230, 208, 0.4);
        border-radius: 999px;
        color: #d1e6d0;
        background: rgba(209, 230, 208, 0.1);
        padding: 0.45rem 1rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 140ms ease, background 140ms ease;
      }

      .restart-button:hover {
        transform: translateY(-1px);
        background: rgba(209, 230, 208, 0.22);
      }

      #hud.game-over {
        border-color: rgba(255, 230, 180, 0.55);
      }

      .back-button {
        position: fixed;
        top: 1.2rem;
        left: 1.2rem;
        padding: 0.65rem 1.2rem;
        border-radius: 999px;
        border: 1px solid rgba(209, 230, 208, 0.45);
        color: #d1e6d0;
        text-decoration: none;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(12, 24, 16, 0.55);
        backdrop-filter: blur(6px);
        box-shadow: 0 14px 28px rgba(6, 12, 8, 0.45);
        transition: transform 160ms ease, background 160ms ease,
          box-shadow 160ms ease;
        z-index: 20;
      }

      .back-button:hover {
        transform: translateY(-2px);
        background: rgba(209, 230, 208, 0.22);
        box-shadow: 0 18px 36px rgba(6, 12, 8, 0.5);
      }

      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      @media (max-width: 520px) {
        #hud {
          padding: 0.8rem 1.1rem;
          inset: 3.2rem auto auto 50%;
          width: min(32rem, calc(100vw - 1rem));
        }

        .hud-stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .back-button {
          padding: 0.6rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <h1>Halkomisharjoitus</h1>
      <p>Napsauta klapia tai paina v&auml;lily&ouml;nti&auml;. Keskikohdan t&auml;ht&auml;ys toimii n&auml;pp&auml;imell&auml;.</p>
      <div class="hud-stats">
        <div class="hud-stat">
          <span class="hud-stat-label">Pisteet</span>
          <span class="hud-stat-value" id="score">0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat-label">Aika</span>
          <span class="hud-stat-value" id="time">60 s</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat-label">Putki</span>
          <span class="hud-stat-value" id="streak">0 / 0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat-label">Tarkkuus</span>
          <span class="hud-stat-value" id="accuracy">100%</span>
        </div>
      </div>
      <div class="hud-controls">
        <button id="restart" class="restart-button" type="button">Uusi kierros</button>
        <span id="difficulty">Vaikeustaso: L&auml;mmittely</span>
      </div>
      <span id="status">Valmiina iskuun</span>
    </div>
    <a class="back-button" href="index.html">Takaisin</a>
    <canvas id="scene"></canvas>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js";

      const canvas = document.getElementById("scene");
      const hud = document.getElementById("hud");
      const statusText = document.getElementById("status");
      const scoreText = document.getElementById("score");
      const timeText = document.getElementById("time");
      const streakText = document.getElementById("streak");
      const accuracyText = document.getElementById("accuracy");
      const difficultyText = document.getElementById("difficulty");
      const restartButton = document.getElementById("restart");

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.08;

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0b150d, 20, 50);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 3.2, 7.2);
      camera.lookAt(0, 1.5, 0);

      const ambientLight = new THREE.AmbientLight(0xb3c9b3, 0.35);
      scene.add(ambientLight);

      const hemisphereLight = new THREE.HemisphereLight(0xbad6c0, 0x2e2618, 0.28);
      scene.add(hemisphereLight);

      const spotlight = new THREE.SpotLight(
        0xf0f7ed,
        1.9,
        40,
        Math.PI / 5,
        0.3,
        1.1
      );
      spotlight.position.set(6, 10, 6);
      spotlight.castShadow = true;
      spotlight.shadow.mapSize.width = 1024;
      spotlight.shadow.mapSize.height = 1024;
      scene.add(spotlight);

      const backLight = new THREE.PointLight(0x94d5ac, 0.4, 20);
      backLight.position.set(-3, 4, -6);
      scene.add(backLight);

      const swingDuration = 0.7;
      const startAngle = -1.05;
      const strikeAngle = -2.4;
      const axePivotOffset = 0.7;
      const axeRestPosition = new THREE.Vector3(
        0.08,
        3.05 + axePivotOffset,
        1.42
      );
      const axeStrikePosition = new THREE.Vector3(
        -0.04,
        2.05 + axePivotOffset,
        0.88
      );

      const ground = new THREE.Mesh(
        new THREE.CylinderGeometry(12, 12, 0.4, 48),
        new THREE.MeshStandardMaterial({
          color: 0x273c2b,
          roughness: 0.85,
          metalness: 0.05,
        })
      );
      ground.receiveShadow = true;
      ground.position.y = -0.2;
      scene.add(ground);

      const choppingBlock = new THREE.Mesh(
        new THREE.CylinderGeometry(0.9, 1.1, 0.8, 24),
        new THREE.MeshStandardMaterial({
          color: 0x5c3b1e,
          roughness: 0.7,
        })
      );
      choppingBlock.castShadow = true;
      choppingBlock.receiveShadow = true;
      choppingBlock.position.set(0, 0.4, 0);
      scene.add(choppingBlock);

      function makeCanvasTexture(size, paint) {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        paint(ctx, size);
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        return texture;
      }

      const barkTexture = makeCanvasTexture(512, (ctx, size) => {
        ctx.fillStyle = "#6c4a2b";
        ctx.fillRect(0, 0, size, size);

        for (let x = 0; x < size; x += 2) {
          const dark = 52 + Math.floor(Math.random() * 40);
          ctx.fillStyle = `rgba(${dark}, ${dark - 12}, ${dark - 24}, 0.2)`;
          ctx.fillRect(x, 0, 1 + Math.random() * 2, size);
        }

        for (let i = 0; i < 60; i += 1) {
          const y = Math.random() * size;
          const width = 12 + Math.random() * 40;
          const height = 2 + Math.random() * 6;
          ctx.fillStyle = "rgba(32, 20, 12, 0.2)";
          ctx.fillRect(Math.random() * (size - width), y, width, height);
        }
      });
      barkTexture.repeat.set(1.8, 1.25);

      const endGrainTexture = makeCanvasTexture(512, (ctx, size) => {
        const center = size * 0.5;
        const radius = size * 0.47;
        ctx.fillStyle = "#c39057";
        ctx.fillRect(0, 0, size, size);

        for (let i = 0; i < 45; i += 1) {
          const ringR = (i / 44) * radius;
          const wobble = Math.sin(i * 0.85) * 2.2;
          ctx.beginPath();
          ctx.arc(center, center, ringR + wobble, 0, Math.PI * 2);
          const c = 118 + Math.floor((i / 44) * 55);
          ctx.strokeStyle = `rgba(${c}, ${c - 28}, ${c - 56}, 0.45)`;
          ctx.lineWidth = 0.7 + (i % 3) * 0.4;
          ctx.stroke();
        }

        for (let i = 0; i < 16; i += 1) {
          const angle = (i / 16) * Math.PI * 2 + Math.random() * 0.15;
          const length = radius * (0.25 + Math.random() * 0.55);
          ctx.beginPath();
          ctx.moveTo(center, center);
          ctx.lineTo(
            center + Math.cos(angle) * length,
            center + Math.sin(angle) * length
          );
          ctx.strokeStyle = "rgba(80, 52, 32, 0.2)";
          ctx.lineWidth = 1 + Math.random() * 1.1;
          ctx.stroke();
        }
      });

      const splitFaceTexture = makeCanvasTexture(512, (ctx, size) => {
        ctx.fillStyle = "#c8955e";
        ctx.fillRect(0, 0, size, size);

        for (let x = 0; x < size; x += 3) {
          const n = 138 + Math.floor(Math.random() * 45);
          ctx.fillStyle = `rgba(${n}, ${n - 32}, ${n - 64}, 0.22)`;
          ctx.fillRect(x, 0, 1 + Math.random() * 1.5, size);
        }

        for (let i = 0; i < 18; i += 1) {
          const x = Math.random() * size;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.bezierCurveTo(
            x + (Math.random() - 0.5) * 20,
            size * 0.35,
            x + (Math.random() - 0.5) * 24,
            size * 0.7,
            x + (Math.random() - 0.5) * 16,
            size
          );
          ctx.strokeStyle = "rgba(92, 62, 38, 0.18)";
          ctx.lineWidth = 0.8 + Math.random();
          ctx.stroke();
        }
      });
      splitFaceTexture.repeat.set(1.1, 1);

      const barkMaterial = new THREE.MeshStandardMaterial({
        color: 0x6d4727,
        map: barkTexture,
        roughness: 0.82,
        metalness: 0.04,
      });

      const endGrainMaterial = new THREE.MeshStandardMaterial({
        color: 0xd2a26f,
        map: endGrainTexture,
        roughness: 0.55,
        metalness: 0.02,
      });

      const splitFaceMaterial = new THREE.MeshStandardMaterial({
        color: 0xd0a26f,
        map: splitFaceTexture,
        roughness: 0.5,
        metalness: 0.02,
      });

      const splitEdgeMaterial = new THREE.MeshStandardMaterial({
        color: 0x8a613d,
        roughness: 0.64,
        metalness: 0.02,
      });

      const chipGeometry = new THREE.BoxGeometry(0.06, 0.028, 0.02);
      const chipMaterial = new THREE.MeshStandardMaterial({
        color: 0xcc9b64,
        roughness: 0.62,
        metalness: 0.02,
      });

      const logRadius = 0.35;
      const logHeight = 1.25;
      const logOrigin = new THREE.Vector3(0, 0.8 + logHeight / 2, 0);
      const splitFaceThickness = logRadius * 0.085;
      const splitFaceGeometry = new THREE.BoxGeometry(
        splitFaceThickness,
        logHeight * 0.97,
        logRadius * 1.94,
        2,
        24,
        10
      );
      const splitFacePositions = splitFaceGeometry.attributes.position;
      for (let i = 0; i < splitFacePositions.count; i += 1) {
        const x = splitFacePositions.getX(i);
        const y = splitFacePositions.getY(i);
        const z = splitFacePositions.getZ(i);
        const centerFactor = 1 - Math.min(1, Math.abs(z) / (logRadius * 0.98));
        const roughness =
          Math.sin(y * 9.2 + z * 12.5) * 0.0028 +
          Math.cos(y * 14.0) * 0.0019 +
          (Math.random() - 0.5) * 0.0022;
        const edgeLift = centerFactor * 0.0014;
        splitFacePositions.setX(
          i,
          x + Math.sign(x || 1) * (roughness + edgeLift)
        );
        splitFacePositions.setZ(
          i,
          z + Math.sin(y * 7.1 + x * 90) * 0.0012 * centerFactor
        );
      }
      splitFacePositions.needsUpdate = true;
      splitFaceGeometry.computeVertexNormals();
      let logGroup = null;

      const axeGroup = new THREE.Group();
      axeGroup.position.copy(axeRestPosition);
      const axeVisual = new THREE.Group();
      axeVisual.position.set(0, -axePivotOffset, 0);

      const handleGeometry = new THREE.CylinderGeometry(0.085, 0.06, 2.8, 24, 32);
      const handlePositions = handleGeometry.attributes.position;
      const handleHalfHeight = 2.8 / 2;
      for (let i = 0; i < handlePositions.count; i += 1) {
        const y = handlePositions.getY(i);
        const t = (y + handleHalfHeight) / 2.8;
        const gripScale =
          t < 0.65
            ? 0.72 + 0.22 * Math.pow(Math.sin(Math.PI * Math.min(t, 0.65)), 2)
            : 0.72;
        const flareScale =
          t > 0.65
            ? 0.78 + 0.32 * Math.pow(Math.max(0, t - 0.65) * 1.7, 1.4)
            : 0.78;
        const scale = t < 0.65 ? gripScale : flareScale;
        const curveOffset = 0.26 * Math.pow(t, 1.5) - 0.14;
        handlePositions.setX(i, handlePositions.getX(i) * scale + curveOffset);
        handlePositions.setZ(i, handlePositions.getZ(i) * scale * 0.62);
      }
      handlePositions.needsUpdate = true;
      handleGeometry.computeVertexNormals();

      const handleMaterial = new THREE.MeshStandardMaterial({
        color: 0xb77a3f,
        roughness: 0.55,
        metalness: 0.05,
      });

      const axeHandle = new THREE.Mesh(handleGeometry, handleMaterial);
      axeHandle.castShadow = true;
      axeHandle.receiveShadow = true;
      axeHandle.position.set(-0.02, -0.05, 0.02);
      axeHandle.rotation.z = Math.PI / 38;

      const pommel = new THREE.Mesh(
        new THREE.SphereGeometry(0.14, 20, 14),
        handleMaterial
      );
      pommel.scale.set(1.12, 0.58, 0.7);
      pommel.position.set(-0.13, -1.38, 0.02);
      pommel.castShadow = true;
      pommel.receiveShadow = true;

      const collar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.13, 0.12, 0.18, 24),
        new THREE.MeshStandardMaterial({
          color: 0x4d2f12,
          roughness: 0.68,
        })
      );
      collar.castShadow = true;
      collar.receiveShadow = true;
      collar.position.set(0.1, 0.38, 0);
      collar.rotation.z = Math.PI / 26;

      const headShape = new THREE.Shape();
      headShape.moveTo(-0.24, -0.32);
      headShape.lineTo(0.16, -0.28);
      headShape.quadraticCurveTo(0.33, 0, 0.18, 0.32);
      headShape.lineTo(-0.18, 0.34);
      headShape.lineTo(-0.28, 0.1);
      headShape.closePath();

      const headGeometry = new THREE.ExtrudeGeometry(headShape, {
        depth: 0.2,
        steps: 1,
        bevelEnabled: false,
      });
      headGeometry.translate(0, 0, -0.1);
      headGeometry.computeVertexNormals();

      const axeHeadBody = new THREE.Mesh(
        headGeometry,
        new THREE.MeshStandardMaterial({
          color: 0x585e62,
          roughness: 0.38,
          metalness: 0.88,
        })
      );
      axeHeadBody.castShadow = true;
      axeHeadBody.receiveShadow = true;

      const bladeGeometry = headGeometry.clone();
      const bladePositions = bladeGeometry.attributes.position;
      for (let i = 0; i < bladePositions.count; i += 1) {
        bladePositions.setZ(i, Math.max(bladePositions.getZ(i), -0.025));
      }
      bladePositions.needsUpdate = true;
      bladeGeometry.computeVertexNormals();

      const axeBlade = new THREE.Mesh(
        bladeGeometry,
        new THREE.MeshStandardMaterial({
          color: 0xdfe6ec,
          roughness: 0.18,
          metalness: 1,
        })
      );

      const eye = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.1, 0.22, 20),
        new THREE.MeshStandardMaterial({
          color: 0x3b3026,
          roughness: 0.55,
        })
      );
      eye.rotation.x = Math.PI / 2;
      eye.position.set(-0.05, 0, -0.01);
      eye.castShadow = true;
      eye.receiveShadow = true;

      const axeHeadGroup = new THREE.Group();
      axeHeadGroup.add(axeHeadBody, axeBlade, eye);
      axeHeadGroup.position.set(0.26, 0.62, -0.04);
      axeHeadGroup.rotation.set(Math.PI / 10, Math.PI / 2.1, -Math.PI / 9);

      axeVisual.add(axeHandle, pommel, collar, axeHeadGroup);
      axeGroup.add(axeVisual);
      axeGroup.rotation.x = startAngle;
      scene.add(axeGroup);

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const clock = new THREE.Clock();

      const roundDuration = 120;
      let roundTimeLeft = roundDuration;
      let score = 0;
      let streak = 0;
      let bestStreak = 0;
      let attempts = 0;
      let hits = 0;
      let worldTime = 0;

      let isSwinging = false;
      let swingProgress = 0;
      let registerHit = false;
      let hasHit = false;
      let isGameOver = false;

      let splitPieces = [];
      let chips = [];
      let resetTimer = -1;
      let currentDifficultyLabel = "";
      const splitRestY = 1.02;

      function updateHud() {
        const shownTime = Math.max(0, Math.ceil(roundTimeLeft));
        const accuracy = attempts > 0 ? Math.round((hits / attempts) * 100) : 100;
        scoreText.textContent = String(score);
        timeText.textContent = `${shownTime} s`;
        streakText.textContent = `${streak} / ${bestStreak}`;
        accuracyText.textContent = `${accuracy}%`;
      }

      function difficultyProfile() {
        const progress = THREE.MathUtils.clamp(
          (roundDuration - roundTimeLeft) / roundDuration,
          0,
          1
        );
        const ramp = Math.pow(progress, 1.75);
        const swayAmplitude = 0.24 + ramp * 0.9;
        const swaySpeed = 1.45 + ramp * 2.45;
        let label = "Lammittely";
        if (progress >= 0.67) {
          label = "Taysi vauhti";
        } else if (progress >= 0.34) {
          label = "Kiihtyva";
        }
        return {
          progress,
          swayAmplitude,
          swaySpeed,
          label,
          scoreBonus: Math.round((0.5 + ramp) * 110),
        };
      }

      function updateDifficulty(force = false) {
        const profile = difficultyProfile();
        if (force || profile.label !== currentDifficultyLabel) {
          currentDifficultyLabel = profile.label;
          difficultyText.textContent = `Vaikeustaso: ${profile.label}`;
        }
        return profile;
      }

      function clearSplitPieces() {
        splitPieces.forEach((piece) => {
          scene.remove(piece.group);
        });
        splitPieces = [];
      }

      function clearChips() {
        chips.forEach((chip) => {
          scene.remove(chip.mesh);
        });
        chips = [];
      }

      function createLog() {
        if (logGroup) {
          scene.remove(logGroup);
        }
        logGroup = new THREE.Group();

        const fullLog = new THREE.Mesh(
          new THREE.CylinderGeometry(logRadius, logRadius, logHeight, 48),
          [barkMaterial, endGrainMaterial, endGrainMaterial]
        );
        fullLog.castShadow = true;
        fullLog.receiveShadow = true;

        logGroup.add(fullLog);
        logGroup.position.copy(logOrigin);
        scene.add(logGroup);
      }

      function createHalfLog(thetaStart, direction, basePosition) {
        const group = new THREE.Group();

        const halfBody = new THREE.Mesh(
          new THREE.CylinderGeometry(
            logRadius,
            logRadius,
            logHeight,
            48,
            1,
            false,
            thetaStart,
            Math.PI
          ),
          [barkMaterial, endGrainMaterial, endGrainMaterial]
        );

        const splitFace = new THREE.Mesh(splitFaceGeometry, [
          splitFaceMaterial,
          splitFaceMaterial,
          splitEdgeMaterial,
          splitEdgeMaterial,
          splitEdgeMaterial,
          splitEdgeMaterial,
        ]);
        splitFace.position.x = direction * splitFaceThickness * 0.48;
        splitFace.position.z = direction * 0.002;

        [halfBody, splitFace].forEach((mesh) => {
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          group.add(mesh);
        });

        group.position.set(
          basePosition.x + direction * 0.18,
          basePosition.y,
          basePosition.z
        );
        group.rotation.y = direction > 0 ? 0.05 : -0.05;
        return group;
      }

      function spawnChips(origin, count) {
        for (let i = 0; i < count; i += 1) {
          const mesh = new THREE.Mesh(chipGeometry, chipMaterial);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          mesh.position.copy(origin);
          mesh.position.x += (Math.random() - 0.5) * 0.25;
          mesh.position.y += (Math.random() - 0.2) * 0.16;
          mesh.position.z += (Math.random() - 0.5) * 0.22;
          scene.add(mesh);

          chips.push({
            mesh,
            velocity: new THREE.Vector3(
              (Math.random() - 0.5) * 2.1,
              1.3 + Math.random() * 1.2,
              (Math.random() - 0.5) * 1.1
            ),
            spin: new THREE.Vector3(
              (Math.random() - 0.5) * 8,
              (Math.random() - 0.5) * 8,
              (Math.random() - 0.5) * 8
            ),
            life: 0.9 + Math.random() * 0.6,
          });
        }
      }

      function splitLog() {
        if (!logGroup) {
          return;
        }

        const origin = logGroup.position.clone();
        scene.remove(logGroup);
        logGroup = null;

        const leftHalf = createHalfLog(Math.PI, -1, origin);
        const rightHalf = createHalfLog(0, 1, origin);
        scene.add(leftHalf, rightHalf);

        splitPieces = [
          {
            group: leftHalf,
            velocity: new THREE.Vector3(-0.78, 1.45, 0.18),
            spin: new THREE.Vector3(0.22, 0.42, 0.36),
            direction: -1,
            resting: false,
          },
          {
            group: rightHalf,
            velocity: new THREE.Vector3(0.78, 1.38, -0.18),
            spin: new THREE.Vector3(-0.2, -0.4, -0.36),
            direction: 1,
            resting: false,
          },
        ];

        spawnChips(origin.clone().add(new THREE.Vector3(0, 0.18, 0)), 16);

        const bonus = 120 + (streak > 0 ? Math.min(streak, 8) * 18 : 0);
        const gained = bonus + updateDifficulty().scoreBonus;
        score += gained;
        hits += 1;
        streak += 1;
        bestStreak = Math.max(bestStreak, streak);
        statusText.textContent = `Osuma! +${gained} pistetta`;

        resetTimer = -1;
        updateHud();
      }

      function resetLog() {
        clearSplitPieces();
        if (!isGameOver) {
          createLog();
          statusText.textContent = "Valmiina iskuun";
        }
      }

      function easeOutQuart(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function easeInOutQuad(t) {
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function isLogHitFromScreen(screenX, screenY) {
        if (!logGroup) {
          return false;
        }
        pointer.x = (screenX / window.innerWidth) * 2 - 1;
        pointer.y = -(screenY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        return raycaster.intersectObject(logGroup, true).length > 0;
      }

      function startSwing(targeted) {
        if (isSwinging || isGameOver) {
          return;
        }
        isSwinging = true;
        swingProgress = 0;
        registerHit = targeted;
        hasHit = false;
        statusText.textContent = targeted
          ? "Tayta isku..."
          : "Huti - yrita uudestaan";
      }

      function attemptSwing(targeted) {
        if (isGameOver || isSwinging) {
          return;
        }
        if (!logGroup) {
          statusText.textContent = "Odota hetki, uusi klapi tulossa";
          return;
        }
        attempts += 1;
        startSwing(targeted);
        updateHud();
      }

      function endRound() {
        if (isGameOver) {
          return;
        }
        isGameOver = true;
        isSwinging = false;
        swingProgress = 0;
        registerHit = false;
        hasHit = false;
        resetTimer = -1;
        axeGroup.position.copy(axeRestPosition);
        axeGroup.rotation.x = startAngle;
        hud.classList.add("game-over");
        difficultyText.textContent = "Vaikeustaso: Kierros valmis";
        statusText.textContent = `Aika loppui! Pisteet ${score} | Osumat ${hits}/${attempts}`;
        updateHud();
      }

      function restartRound() {
        roundTimeLeft = roundDuration;
        score = 0;
        streak = 0;
        bestStreak = 0;
        attempts = 0;
        hits = 0;
        isGameOver = false;
        isSwinging = false;
        swingProgress = 0;
        registerHit = false;
        hasHit = false;
        resetTimer = -1;
        worldTime = 0;

        hud.classList.remove("game-over");
        currentDifficultyLabel = "";
        updateDifficulty(true);

        if (logGroup) {
          scene.remove(logGroup);
          logGroup = null;
        }
        clearSplitPieces();
        clearChips();
        createLog();

        axeGroup.position.copy(axeRestPosition);
        axeGroup.rotation.x = startAngle;

        statusText.textContent = "Valmiina iskuun";
        updateHud();
      }

      restartButton.addEventListener("click", () => {
        restartRound();
      });

      window.addEventListener("pointerdown", (event) => {
        const target = event.target;
        if (
          target instanceof Element &&
          (
            target.closest(".back-button") ||
            target.closest(".restart-button") ||
            target.closest("#hud")
          )
        ) {
          return;
        }
        attemptSwing(isLogHitFromScreen(event.clientX, event.clientY));
      });

      window.addEventListener("keydown", (event) => {
        if (event.code !== "Space") {
          return;
        }
        event.preventDefault();
        attemptSwing(
          isLogHitFromScreen(window.innerWidth * 0.5, window.innerHeight * 0.5)
        );
      });

      window.addEventListener("resize", () => {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      });

      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        worldTime += delta;
        let profile = difficultyProfile();

        if (!isGameOver) {
          profile = updateDifficulty();
          roundTimeLeft = Math.max(0, roundTimeLeft - delta);
          if (roundTimeLeft <= 0) {
            endRound();
          }
        }

        if (logGroup && !isGameOver) {
          const ramp = Math.pow(profile.progress, 1.75);
          const zMultiplier = 0.95 + ramp * 0.72;
          const rollMultiplier = 1.1 + ramp * 1.08;
          logGroup.position.x =
            logOrigin.x + Math.sin(worldTime * profile.swaySpeed) * profile.swayAmplitude;
          logGroup.position.z =
            logOrigin.z +
            Math.cos(worldTime * profile.swaySpeed * 0.85) *
              profile.swayAmplitude *
              zMultiplier;
          logGroup.rotation.z =
            Math.sin(worldTime * profile.swaySpeed * 1.2) *
            profile.swayAmplitude *
            rollMultiplier;
        }

        if (isSwinging) {
          swingProgress += delta / swingDuration;
          const clamped = Math.min(swingProgress, 1);

          if (clamped <= 0.6) {
            const t = easeOutQuart(clamped / 0.6);
            axeGroup.rotation.x = startAngle + (strikeAngle - startAngle) * t;
            axeGroup.position.lerpVectors(axeRestPosition, axeStrikePosition, t);
            if (!hasHit && registerHit && t > 0.8) {
              splitLog();
              hasHit = true;
            }
          } else {
            const t = easeInOutQuad((clamped - 0.6) / 0.4);
            axeGroup.rotation.x = strikeAngle + (startAngle - strikeAngle) * t;
            axeGroup.position.lerpVectors(axeStrikePosition, axeRestPosition, t);
          }

          if (swingProgress >= 1) {
            isSwinging = false;
            swingProgress = 0;
            registerHit = false;
            if (!hasHit) {
              streak = 0;
              statusText.textContent = "Ei osumaa - koeta uudestaan";
              updateHud();
            }
            axeGroup.position.copy(axeRestPosition);
            axeGroup.rotation.x = startAngle;
          }
        }

        if (splitPieces.length > 0) {
          splitPieces.forEach((piece) => {
            if (piece.resting) {
              return;
            }
            piece.velocity.y -= 6.8 * delta;
            piece.group.position.addScaledVector(piece.velocity, delta);
            piece.group.rotation.x += piece.spin.x * delta;
            piece.group.rotation.y += piece.spin.y * delta;
            piece.group.rotation.z += piece.spin.z * delta;

            if (piece.group.position.y <= splitRestY) {
              piece.group.position.y = splitRestY;
              piece.velocity.set(0, 0, 0);
              piece.spin.set(0, 0, 0);
              piece.group.position.x += piece.direction * 0.05;
              piece.group.position.z += piece.direction * 0.04;
              piece.group.rotation.x = piece.direction * 0.06;
              piece.group.rotation.y = piece.direction * 0.52;
              piece.group.rotation.z = piece.direction * -0.48;
              piece.resting = true;
            }
          });

          if (splitPieces.every((piece) => piece.resting) && resetTimer < 0) {
            resetTimer = 1.9;
            statusText.textContent = isGameOver
              ? "Kierros paattyi"
              : "Halko hajosi - uusi klapi tulossa";
          }

          if (resetTimer > 0) {
            resetTimer -= delta;
            if (resetTimer <= 0) {
              resetLog();
            }
          }
        }

        for (let i = chips.length - 1; i >= 0; i -= 1) {
          const chip = chips[i];
          chip.velocity.y -= 9.2 * delta;
          chip.mesh.position.addScaledVector(chip.velocity, delta);
          chip.mesh.rotation.x += chip.spin.x * delta;
          chip.mesh.rotation.y += chip.spin.y * delta;
          chip.mesh.rotation.z += chip.spin.z * delta;
          chip.life -= delta;

          if (chip.mesh.position.y <= 0.03) {
            chip.mesh.position.y = 0.03;
            chip.velocity.y *= -0.28;
            chip.velocity.x *= 0.74;
            chip.velocity.z *= 0.74;
          }

          if (chip.life <= 0) {
            scene.remove(chip.mesh);
            chips.splice(i, 1);
          }
        }

        renderer.render(scene, camera);
      }

      restartRound();
      animate();
    </script>
  </body>
</html>
